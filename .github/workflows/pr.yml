name: PR Tests

on:
  pull_request:
    branches:
      - main
      - dev
      - next
      - 'mw-**'
      - 'feat/**'

permissions:
  contents: read
  # Required by .github/actions/inject-linked-web-sdk-pr's sticky comment
  # step. Only the `ci` job opts into posting (`comment: true`), but
  # workflow-level perms apply to all jobs.
  pull-requests: write

jobs:
  translations:
    name: Update Translation Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Use Node 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # If the PR description carries a "Web SDK PR: #N" marker, this
      # builds @miden-sdk/miden-sdk + @miden-sdk/react from the linked
      # web-sdk PR and rewrites package.json to consume them via file:
      # deps. Silent no-op when no marker. comment=false: the `ci` job
      # is the designated comment-poster.
      - name: Inject linked web-sdk PR
        uses: ./.github/actions/inject-linked-web-sdk-pr

      - name: Run Install
        uses: borales/actions-yarn@v4
        with:
          cmd: install

      - name: Generate Translation Files
        uses: borales/actions-yarn@v4
        with:
          cmd: createTranslationFile

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet public/_locales/ || echo "changes=true" >> $GITHUB_OUTPUT

      # Only commit/push for non-fork PRs (forks can't push back)
      - name: Commit and push translation updates
        id: commit
        if: steps.git-check.outputs.changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/_locales/
          git commit -m "chore: update translation files"
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

  ci:
    name: Test
    needs: translations
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Use Node 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # Designated comment-poster: this is the most prominent job (runs
      # ESLint + TS + tests + build:chrome + Playwright E2E) so the
      # sticky linked-web-sdk-pr comment lives on its run summary.
      - name: Inject linked web-sdk PR
        uses: ./.github/actions/inject-linked-web-sdk-pr
        with:
          comment: 'true'

      - name: Run Install
        uses: borales/actions-yarn@v4
        with:
          cmd: install

      - name: Run ESLint
        uses: borales/actions-yarn@v4
        with:
          cmd: lint

      - name: Run TypeScript Check
        uses: borales/actions-yarn@v4
        with:
          cmd: ts

      - name: Run Unit Tests
        uses: borales/actions-yarn@v4
        with:
          cmd: test

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build chrome
        uses: borales/actions-yarn@v4
        with:
          cmd: build:chrome
        env:
          MIDEN_USE_MOCK_CLIENT: 'true'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: xvfb-run -a yarn test:e2e

  coverage:
    name: Coverage Check (95% minimum)
    needs: translations
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Use Node 22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Inject linked web-sdk PR
        uses: ./.github/actions/inject-linked-web-sdk-pr

      - name: Run Install
        uses: borales/actions-yarn@v4
        with:
          cmd: install

      - name: Run Coverage Check
        uses: borales/actions-yarn@v4
        with:
          cmd: test:coverage

  i18n-check:
    name: Check for non-i18n'd strings
    needs: translations
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Inject linked web-sdk PR
        uses: ./.github/actions/inject-linked-web-sdk-pr

      - name: Install dependencies
        # When the inject action has rewritten package.json, --frozen-lockfile
        # would fail because yarn.lock no longer matches the new file: deps.
        # Skip the frozen flag conditionally: if the action patched, fall
        # back to a normal install which will update yarn.lock in-place.
        # On runs without a Web SDK PR marker, --frozen-lockfile stays on.
        run: |
          if [ -f .linked-web-sdk-pr.json ] || grep -qE '"@miden-sdk/(miden-sdk|react)":[[:space:]]*"file:' package.json; then
            yarn install
          else
            yarn install --frozen-lockfile
          fi

      - name: Check i18n compliance
        run: yarn lint:i18n

<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="shortcut icon" href="misc/logo-white-bg-16.png" />
    <title>Miden Wallet</title>
    <style>
      /* Full height hierarchy for mobile */
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      /* Text rendering improvements */
      html {
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /*
       * Safe area padding for notched devices.
       * !important because Tailwind 4 preflight + app CSS (which loads AFTER
       * this inline <style>) sets body padding via rules that end up winning
       * the cascade, zeroing out our env() values. We need these to stick.
       */
      body {
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: max(12px, env(safe-area-inset-bottom)) !important;
        padding-left: env(safe-area-inset-left) !important;
        padding-right: env(safe-area-inset-right) !important;
        box-sizing: border-box;
      }

      /* Ensure #root children take full height */
      #root > div {
        width: 100% !important;
        height: 100% !important;
        max-width: 100vw !important;
        min-width: 0 !important;
        overflow-x: hidden;
      }

      /* Override extension-specific fixed width classes */
      .w-\[360px\], .w-\[600px\], .w-\[37\.5rem\], .w-\[500px\] {
        width: 100% !important;
        max-width: 100% !important;
      }

      .max-w-\[360px\], .max-w-\[600px\], .max-w-\[500px\] {
        max-width: 100% !important;
      }

      /* Override extension-specific fixed height classes */
      .h-\[600px\], .h-\[640px\], .h-\[40rem\] {
        height: 100% !important;
      }

      .max-h-\[600px\], .max-h-\[640px\] {
        max-height: none !important;
      }

      /* Fix for images and SVGs that might overflow */
      img, svg {
        max-width: 100%;
      }

      /*
       * Splash placeholder shown until React mounts.
       *
       * On iOS 26+ the WKWebView blanks the page if there's no first paint
       * before the page's main script finishes evaluating. The Miden SDK
       * uses a top-level `await __wbg_init` to load the 62.7MB WASM module,
       * which delays module evaluation by hundreds of ms — long enough that
       * iOS 26 sees "no paint since load commit" and forcibly clears the
       * compositor layers, leaving the user staring at a blank screen for
       * the rest of the session.
       *
       * Putting visible content inside `<div id="root">` gives WebKit
       * something to paint immediately, satisfying the first-paint check.
       * React's `createRoot(...).render()` replaces this content as soon
       * as the WASM finishes loading.
       */
      #miden-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #F6F4F2;
      }
      #miden-splash img {
        width: 96px;
        height: 96px;
        object-fit: contain;
      }
    </style>
  </head>
  <body style="background-color: #F6F4F2;">
    <!--
      Splash element lives OUTSIDE #root so it stays paintable while
      React's createRoot mounts into the empty #root. mobile-app.tsx
      removes #miden-splash after the React render call returns.
    -->
    <div id="miden-splash">
      <img src="misc/logo-white-bg-16.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/mobile-app.tsx"></script>
  </body>
</html>

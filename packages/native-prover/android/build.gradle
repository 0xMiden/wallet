ext {
    junitVersion = project.hasProperty('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'
    androidxJunitVersion = project.hasProperty('androidxJunitVersion') ? rootProject.ext.androidxJunitVersion : '1.3.0'
}

buildscript {
    // The Android Gradle Plugin and Kotlin Gradle Plugin classpaths are
    // already on the root project's buildscript classpath (the wallet's
    // android/build.gradle declares both). Declaring them again here as
    // a fallback for cases where this module is consumed by a project
    // that doesn't have them at the root.
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        // kotlin_version is defined on the root project's `ext` (see
        // android/build.gradle). Fall back to a recent version if the
        // root didn't set it.
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${rootProject.hasProperty('kotlin_version') ? rootProject.ext.kotlin_version : '2.1.0'}"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace = "com.miden.nativeprover"
    compileSdk = project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 36
    defaultConfig {
        minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 24
        targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 36
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    sourceSets {
        // Prebuilt .so files for the native prover live under
        // src/main/jniLibs/<abi>/libmiden_native_prover_jni.so. Same
        // committed-binary pattern the iOS xcframework follows. Rebuild
        // via `packages/native-prover/scripts/build-android.sh`.
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = "21"
    }
    lintOptions {
        abortOnError = false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation project(':capacitor-android')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${rootProject.hasProperty('kotlin_version') ? rootProject.ext.kotlin_version : '2.1.0'}"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
}
